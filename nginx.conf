server {
    listen 80;

    # ドキュメントルートを public/ に設定
    # → /index.html, /style.css, /assets/... がすべて public/ から解決される
    root /usr/share/nginx/html/public;
    index index.html;

    # /src/ はプロジェクトルートの src/ ディレクトリを参照
    # index.html の ../src/main.js が /src/main.js として解決される
    location /src/ {
        root /usr/share/nginx/html;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
